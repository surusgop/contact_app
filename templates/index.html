<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Import Contact — NationBuilder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f4f6f9; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .section-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #6c757d;
      margin-bottom: .5rem;
    }
    #result { display: none; }
  </style>
</head>
<body>
  <div class="container py-5" style="max-width: 640px;">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <div class="d-flex align-items-center gap-2">
        {% if current_user.picture %}
        <img src="{{ current_user.picture }}" class="rounded-circle" width="28" height="28" />
        {% endif %}
        <span class="text-muted" style="font-size:.85rem;">{{ current_user.name }}</span>
      </div>
      <div class="d-flex gap-2">
        <a href="/bulk" class="btn btn-outline-primary btn-sm">Bulk Import</a>
        <a href="/logout" class="btn btn-outline-secondary btn-sm">Sign out</a>
      </div>
    </div>
    <div class="d-flex align-items-center justify-content-between mb-1">
      <h4 class="mb-0 fw-semibold">Import Contact</h4>
    </div>
    <p class="text-muted mb-4" style="font-size:.9rem;">Log a contact interaction in NationBuilder.</p>

    <form id="contactForm" novalidate>

      <!-- Nation -->
      <div class="card mb-3 p-3">
        <div class="section-label">Nation</div>
        <div class="mb-0">
          <label class="form-label mb-1" for="nation_search">Search nation <span class="text-danger">*</span></label>
          <div class="position-relative">
            <input type="text" class="form-control" id="nation_search"
                   placeholder="Type a town, area, or nation name…" autocomplete="off" />
            <div id="nation_results"
                 class="list-group position-absolute w-100 shadow-sm"
                 style="z-index:200;display:none;max-height:220px;overflow-y:auto;top:100%;"></div>
          </div>
          <input type="hidden" id="nation_slug" name="nation_slug" />
          <div id="nation_selected" class="mt-1 text-muted" style="font-size:.8rem;display:none;">
            Slug: <span id="nation_slug_display" class="fw-semibold text-dark"></span>
          </div>
        </div>
      </div>

      <!-- Contact details -->
      <div class="card mb-3 p-3">
        <div class="section-label">Contact Details</div>
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label mb-1" for="name_search">
              Search person
              <span class="text-muted fw-normal" style="font-size:.85rem">(type first + last name)</span>
            </label>
            <div class="position-relative">
              <input type="text" class="form-control" id="name_search"
                     placeholder="e.g. Jane Smith" autocomplete="off" />
              <div id="search_results"
                   class="list-group position-absolute w-100 shadow-sm"
                   style="z-index:200;display:none;max-height:220px;overflow-y:auto;top:100%;"></div>
            </div>
          </div>
          <div class="col-6">
            <label class="form-label mb-1" for="signup_id">Signup ID</label>
            <input type="text" class="form-control" id="signup_id" name="signup_id"
                   placeholder="Filled by search" readonly style="background:#f8f9fa;" />
          </div>
          <div class="col-6">
            <label class="form-label mb-1" for="author_id">Author ID <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="author_id" name="author_id"
                   placeholder="NB ID of person logging this" />
          </div>
          <div class="col-6">
            <label class="form-label mb-1" for="contact_method">Contact method</label>
            <select class="form-select" id="contact_method" name="contact_method">
              <option value="">— select —</option>
              {% for m in contact_methods %}
              <option value="{{ m }}">{{ m.replace('_', ' ').title() }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-6">
            <label class="form-label mb-1" for="contact_status">Contact status</label>
            <select class="form-select" id="contact_status" name="contact_status">
              <option value="">— select —</option>
              {% for s in contact_statuses %}
              <option value="{{ s }}">{{ s.replace('_', ' ').title() }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12">
            <label class="form-label mb-1" for="content">Notes</label>
            <textarea class="form-control" id="content" name="content" rows="3"
                      placeholder="Notes about this contact interaction"></textarea>
          </div>
        </div>
      </div>


<button type="submit" class="btn btn-primary w-100" id="submitBtn">
        Import Contact
      </button>
    </form>

    <!-- Result -->
    <div id="result" class="card mt-3 p-3">
      <div id="resultContent"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const submitBtn = document.getElementById('submitBtn');
    const result = document.getElementById('result');
    const resultContent = document.getElementById('resultContent');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const nationSlug = document.getElementById('nation_slug').value.trim();
      if (!nationSlug) {
        showResult(false, 'Please select a nation before importing.', null);
        nationSearch.focus();
        return;
      }

      const signupId = document.getElementById('signup_id').value.trim();
      if (!signupId) {
        showResult(false, 'Please search and select a person (Signup ID is required).', null);
        return;
      }

      const authorId = document.getElementById('author_id').value.trim();
      if (!authorId) {
        showResult(false, 'Author ID is required — enter the NationBuilder ID of the person logging this contact.', null);
        document.getElementById('author_id').focus();
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Importing…';
      result.style.display = 'none';

      try {
        const resp = await fetch('/import', {
          method: 'POST',
          body: new FormData(form),
        });
        const json = await resp.json();

        if (json.success) {
          const contactId = json.data?.data?.id ?? '—';
          showResult(true, `Contact created successfully. ID: <strong>${contactId}</strong>`, json.data);
        } else {
          showResult(false, json.error, json.detail);
        }
      } catch (err) {
        showResult(false, `Network error: ${err.message}`, null);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Import Contact';
      }
    });

    // Nation search
    const nationSearch = document.getElementById('nation_search');
    const nationResults = document.getElementById('nation_results');
    const nationSlugInput = document.getElementById('nation_slug');
    const nationSelected = document.getElementById('nation_selected');
    const nationSlugDisplay = document.getElementById('nation_slug_display');
    let nationTimer;

    nationSearch.addEventListener('input', () => {
      clearTimeout(nationTimer);
      const val = nationSearch.value.trim();
      if (val.length < 2) {
        nationResults.style.display = 'none';
        return;
      }
      nationTimer = setTimeout(() => runNationSearch(val), 300);
    });

    document.addEventListener('click', (e) => {
      if (!nationSearch.contains(e.target) && !nationResults.contains(e.target)) {
        nationResults.style.display = 'none';
      }
    });

    async function runNationSearch(term) {
      nationResults.innerHTML = '<div class="list-group-item text-muted" style="font-size:.85rem">Searching…</div>';
      nationResults.style.display = 'block';
      try {
        const resp = await fetch(`/search-nation?term=${encodeURIComponent(term)}`);
        const json = await resp.json();
        nationResults.innerHTML = '';
        if (!json.success || !json.records.length) {
          nationResults.innerHTML = '<div class="list-group-item text-muted" style="font-size:.85rem">No matches found</div>';
          return;
        }
        json.records.forEach(record => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'list-group-item list-group-item-action py-2';
          btn.innerHTML = `
            <div style="font-size:.9rem;font-weight:500">${record.group}</div>
            <div class="text-muted" style="font-size:.78rem">${[record.state, record.slug].filter(Boolean).join(' — ')}</div>
          `;
          btn.addEventListener('click', () => {
            nationSlugInput.value = record.slug;
            nationSearch.value = record.group;
            nationSlugDisplay.textContent = record.slug;
            nationSelected.style.display = 'block';
            nationResults.style.display = 'none';
          });
          nationResults.appendChild(btn);
        });
      } catch (err) {
        nationResults.innerHTML = `<div class="list-group-item text-danger" style="font-size:.85rem">Search error: ${err.message}</div>`;
      }
    }

    // Name search
    const nameSearch = document.getElementById('name_search');
    const searchResults = document.getElementById('search_results');
    const signupIdInput = document.getElementById('signup_id');
    let searchTimer;

    nameSearch.addEventListener('input', () => {
      clearTimeout(searchTimer);
      const val = nameSearch.value.trim();
      if (val.length < 2) {
        searchResults.style.display = 'none';
        return;
      }
      searchTimer = setTimeout(() => runSearch(val), 300);
    });

    document.addEventListener('click', (e) => {
      if (!nameSearch.contains(e.target) && !searchResults.contains(e.target)) {
        searchResults.style.display = 'none';
      }
    });

    async function runSearch(name) {
      const slug = document.getElementById('nation_slug').value.trim();
      if (!slug) return;
      searchResults.innerHTML = '<div class="list-group-item text-muted" style="font-size:.85rem">Searching…</div>';
      searchResults.style.display = 'block';
      try {
        const resp = await fetch(`/search-signup?name=${encodeURIComponent(name)}&nation_slug=${encodeURIComponent(slug)}`);
        const json = await resp.json();
        searchResults.innerHTML = '';
        if (!json.success) {
          searchResults.innerHTML = `<div class="list-group-item text-danger" style="font-size:.85rem">${json.error}</div>`;
          return;
        }
        if (!json.records.length) {
          searchResults.innerHTML = '<div class="list-group-item text-muted" style="font-size:.85rem">No matches found</div>';
          return;
        }
        json.records.forEach(record => {
          const displayName = record.full_name || `${record.first_name || ''} ${record.last_name || ''}`.trim();
          const addressLine = [record.address1].filter(Boolean).join('');
          const cityLine = [record.city, record.state, record.zip].filter(Boolean).join(', ');
          const id = record.nb_id ?? '';
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'list-group-item list-group-item-action py-2';
          btn.innerHTML = `
            <div style="font-size:.9rem;font-weight:500">${displayName}</div>
            ${addressLine ? `<div class="text-muted" style="font-size:.78rem">${addressLine}</div>` : ''}
            ${cityLine ? `<div class="text-muted" style="font-size:.78rem">${cityLine}</div>` : ''}
            <div class="text-muted" style="font-size:.75rem">ID: ${id}</div>
          `;
          btn.addEventListener('click', () => {
            signupIdInput.value = id;
            nameSearch.value = displayName;
            searchResults.style.display = 'none';
          });
          searchResults.appendChild(btn);
        });
      } catch (err) {
        searchResults.innerHTML = `<div class="list-group-item text-danger" style="font-size:.85rem">Search error: ${err.message}</div>`;
      }
    }

    function showResult(success, message, detail) {
      result.style.display = 'block';
      result.className = `card mt-3 p-3 border-${success ? 'success' : 'danger'}`;

      let html = `<p class="mb-0 text-${success ? 'success' : 'danger'} fw-semibold">${message}</p>`;
      if (detail) {
        html += `<pre class="mt-2 mb-0 p-2 bg-light rounded" style="font-size:.8rem;max-height:200px;overflow:auto;">${JSON.stringify(detail, null, 2)}</pre>`;
      }
      resultContent.innerHTML = html;
      result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  </script>
</body>
</html>
