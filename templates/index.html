<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Import Contact — NationBuilder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f4f6f9; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .section-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #6c757d;
      margin-bottom: .5rem;
    }
    #result { display: none; }
  </style>
</head>
<body>
  <div class="container py-5" style="max-width: 640px;">
    <h4 class="mb-1 fw-semibold">Import Contact</h4>
    <p class="text-muted mb-4" style="font-size:.9rem;">Log a contact interaction in NationBuilder.</p>

    <form id="contactForm" novalidate>

      <!-- Nation -->
      <div class="card mb-3 p-3">
        <div class="section-label">Nation</div>
        <div class="mb-0">
          <label class="form-label mb-1" for="nation_slug">Nation slug <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="nation_slug" name="nation_slug"
                 placeholder="e.g. barringtongop" value="barringtongop" required />
        </div>
      </div>

      <!-- Contact details -->
      <div class="card mb-3 p-3">
        <div class="section-label">Contact Details</div>
        <div class="row g-3">
          <div class="col-6">
            <label class="form-label mb-1" for="signup_id">Signup ID</label>
            <input type="text" class="form-control" id="signup_id" name="signup_id"
                   placeholder="Person being contacted" />
          </div>
          <div class="col-6">
            <label class="form-label mb-1" for="author_id">Author ID</label>
            <input type="text" class="form-control" id="author_id" name="author_id"
                   placeholder="Who made the contact" />
          </div>
          <div class="col-6">
            <label class="form-label mb-1" for="contact_method">Contact method</label>
            <select class="form-select" id="contact_method" name="contact_method">
              <option value="">— select —</option>
              {% for m in contact_methods %}
              <option value="{{ m }}">{{ m.replace('_', ' ').title() }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-6">
            <label class="form-label mb-1" for="contact_status">Contact status</label>
            <select class="form-select" id="contact_status" name="contact_status">
              <option value="">— select —</option>
              {% for s in contact_statuses %}
              <option value="{{ s }}">{{ s.replace('_', ' ').title() }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12">
            <label class="form-label mb-1" for="content">Notes</label>
            <textarea class="form-control" id="content" name="content" rows="3"
                      placeholder="Notes about this contact interaction"></textarea>
          </div>
        </div>
      </div>

      <!-- Optional -->
      <div class="card mb-3 p-3">
        <div class="section-label">Optional</div>
        <div class="row g-3">
          <div class="col-6">
            <label class="form-label mb-1" for="broadcaster_id">Broadcaster ID</label>
            <input type="text" class="form-control" id="broadcaster_id" name="broadcaster_id" />
          </div>
          <div class="col-6">
            <label class="form-label mb-1" for="pc_in_cents">Political capital (cents)</label>
            <input type="number" class="form-control" id="pc_in_cents" name="pc_in_cents"
                   min="0" placeholder="0" />
          </div>
          <div class="col-6">
            <label class="form-label mb-1" for="path_id">Path ID</label>
            <input type="text" class="form-control" id="path_id" name="path_id" />
          </div>
          <div class="col-6">
            <label class="form-label mb-1" for="path_step_id">Path step ID</label>
            <input type="text" class="form-control" id="path_step_id" name="path_step_id" />
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100" id="submitBtn">
        Import Contact
      </button>
    </form>

    <!-- Result -->
    <div id="result" class="card mt-3 p-3">
      <div id="resultContent"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const submitBtn = document.getElementById('submitBtn');
    const result = document.getElementById('result');
    const resultContent = document.getElementById('resultContent');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const nationSlug = document.getElementById('nation_slug').value.trim();
      if (!nationSlug) {
        showResult(false, 'Nation slug is required.', null);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Importing…';
      result.style.display = 'none';

      try {
        const resp = await fetch('/import', {
          method: 'POST',
          body: new FormData(form),
        });
        const json = await resp.json();

        if (json.success) {
          const contactId = json.data?.data?.id ?? '—';
          showResult(true, `Contact created successfully. ID: <strong>${contactId}</strong>`, json.data);
        } else {
          showResult(false, json.error, json.detail);
        }
      } catch (err) {
        showResult(false, `Network error: ${err.message}`, null);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Import Contact';
      }
    });

    function showResult(success, message, detail) {
      result.style.display = 'block';
      result.className = `card mt-3 p-3 border-${success ? 'success' : 'danger'}`;

      let html = `<p class="mb-0 text-${success ? 'success' : 'danger'} fw-semibold">${message}</p>`;
      if (detail) {
        html += `<pre class="mt-2 mb-0 p-2 bg-light rounded" style="font-size:.8rem;max-height:200px;overflow:auto;">${JSON.stringify(detail, null, 2)}</pre>`;
      }
      resultContent.innerHTML = html;
      result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  </script>
</body>
</html>
