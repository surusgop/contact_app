<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Surus Contact App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f4f6f9; }
    .login-card {
      max-width: 400px; margin: 120px auto;
      border: none; box-shadow: 0 2px 12px rgba(0,0,0,.1);
      border-radius: .75rem; padding: 2.5rem;
      background: #fff;
    }
    .google-btn {
      display: flex; align-items: center; justify-content: center;
      gap: .75rem; width: 100%; padding: .7rem;
      border: 1px solid #dadce0; border-radius: .375rem;
      background: #fff; color: #3c4043; font-size: .95rem;
      font-weight: 500; cursor: pointer; text-decoration: none;
      transition: background .15s, box-shadow .15s;
    }
    .google-btn:hover { background: #f8f9fa; box-shadow: 0 1px 4px rgba(0,0,0,.15); color: #3c4043; }
    .google-logo { width: 20px; height: 20px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <h5 class="fw-semibold mb-1">Surus Contact App</h5>
      <p class="text-muted mb-0" style="font-size:.9rem;">Sign in with your Surus Enterprises account</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 mb-3" style="font-size:.85rem;">{{ error }}</div>
    {% endif %}

    <a href="/login" class="google-btn">
      <svg class="google-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </a>
  </div>
</body>
</html>
