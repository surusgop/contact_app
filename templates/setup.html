<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Nation — Surus Contact App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1823;
      --surface: #162032;
      --surface-2: #1e2d40;
      --gold: #d4a84b;
      --red: #c53030;
      --red-dark: #a82828;
      --text: #dde4ee;
      --muted: #5a7a96;
      --border: #253649;
      --input-bg: #0f1f2e;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem;
    }

    .page-header {
      width: 100%; max-width: 540px;
      display: flex; align-items: center;
      padding-bottom: .85rem;
      border-bottom: 2px solid var(--red);
      margin-bottom: 2.5rem;
    }
    .brand-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem; font-weight: 700;
      color: var(--gold); letter-spacing: .12em; text-transform: uppercase;
    }
    .brand-sep { color: var(--red); margin: 0 .6rem; }
    .brand-sub {
      font-family: 'Oswald', sans-serif;
      font-size: .85rem; color: var(--muted);
      letter-spacing: .1em; text-transform: uppercase;
    }

    .setup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem 2rem 1.75rem;
      width: 100%; max-width: 540px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    .user-row {
      display: flex; align-items: center; gap: .85rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .user-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      border: 2px solid var(--border);
    }
    .user-welcome { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .user-name { font-family: 'Oswald', sans-serif; font-size: 1.1rem; color: var(--text); letter-spacing: .04em; }

    .section-label {
      font-family: 'Oswald', sans-serif;
      font-size: .7rem; letter-spacing: .15em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: .75rem;
    }

    .form-label {
      font-size: .78rem; font-weight: 500;
      color: var(--muted); margin-bottom: .35rem; display: block;
    }
    .form-label span { color: var(--red); }

    .form-control {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .88rem; font-family: 'Inter', sans-serif;
      padding: .6rem .9rem;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .form-control:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(197,48,48,.2);
    }
    .form-control::placeholder { color: #3a5269; }

    .dropdown-box {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      overflow: hidden;
      position: absolute;
      width: 100%; top: calc(100% + 4px);
      z-index: 300;
    }
    .dropdown-item {
      padding: .6rem 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer; font-size: .87rem;
      transition: background .1s;
    }
    .dropdown-item:hover { background: #253649; }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item .item-main { font-weight: 500; color: var(--text); }
    .dropdown-item .item-sub { font-size: .75rem; color: var(--muted); margin-top: .1rem; }

    .slug-badge {
      display: inline-flex; align-items: center; gap: .35rem;
      background: rgba(212,168,75,.12);
      border: 1px solid rgba(212,168,75,.35);
      color: var(--gold); border-radius: 6px;
      padding: .22rem .65rem; font-size: .76rem; font-weight: 500;
      margin-top: .45rem;
    }

    .lookup-box { min-height: 44px; margin: .75rem 0; }
    .lookup-loading { display: flex; align-items: center; gap: .5rem; font-size: .83rem; color: var(--muted); }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert-ok {
      background: rgba(22,163,74,.12); border: 1px solid rgba(22,163,74,.3);
      border-radius: 8px; padding: .6rem 1rem; font-size: .83rem; color: #4ade80;
    }
    .alert-warn {
      background: rgba(217,119,6,.12); border: 1px solid rgba(217,119,6,.3);
      border-radius: 8px; padding: .6rem 1rem; font-size: .83rem; color: #fbbf24;
    }
    .form-hint { font-size: .74rem; color: var(--muted); margin-top: .3rem; }
    .form-hint .ok { color: #4ade80; }

    .btn-continue {
      width: 100%; padding: .75rem;
      background: var(--red); border: none; border-radius: 8px;
      color: #fff;
      font-family: 'Oswald', sans-serif;
      font-size: 1rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      cursor: pointer;
      transition: background .15s, transform .1s;
      box-shadow: 0 4px 16px rgba(197,48,48,.35);
      margin-top: .25rem;
    }
    .btn-continue:hover { background: var(--red-dark); }
    .btn-continue:active { transform: translateY(1px); }
    .btn-continue:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .signout {
      display: block; text-align: center;
      margin-top: 1rem; font-size: .78rem; color: var(--muted);
      text-decoration: none; transition: color .15s;
    }
    .signout:hover { color: var(--text); }

    .mb-3 { margin-bottom: 1rem; }
    .mb-4 { margin-bottom: 1.25rem; }
    .position-relative { position: relative; }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="brand-name">Surus</div>
    <div class="brand-sep">·</div>
    <div class="brand-sub">Contact App</div>
  </div>

  <div class="setup-card">
    <div class="user-row">
      {% if current_user.picture %}
      <img src="{{ current_user.picture }}" class="user-avatar" />
      {% endif %}
      <div>
        <div class="user-welcome">Welcome back</div>
        <div class="user-name">{{ current_user.name }}</div>
      </div>
    </div>

    <div class="section-label">Select Your Nation</div>
    <p style="font-size:.84rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.55;">
      Choose your NationBuilder nation below. We'll look up your ID automatically.
    </p>

    <div class="mb-3">
      <label class="form-label">Nation <span>*</span></label>
      <div class="position-relative">
        <input type="text" class="form-control" id="nation_search"
               placeholder="Type a town, area, or nation name…" autocomplete="off" />
        <div id="nation_results" class="dropdown-box" style="display:none;"></div>
      </div>
      <input type="hidden" id="nation_slug" />
      <div id="nation_selected" style="display:none;">
        <div class="slug-badge">
          <svg width="11" height="11" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
          </svg>
          <span id="nation_slug_display"></span>
        </div>
      </div>
    </div>

    <div class="lookup-box" id="lookup-status"></div>

    <div class="mb-4" id="nb-id-row" style="display:none;">
      <label class="form-label">Your NationBuilder ID</label>
      <input type="text" class="form-control" id="nb_id_input" placeholder="Enter your NB ID" />
      <div class="form-hint" id="nb-id-help"></div>
    </div>

    <button class="btn-continue" id="continue-btn" disabled onclick="saveAndContinue()">
      Continue →
    </button>
    <a href="/logout" class="signout">Sign out</a>
  </div>

  <script>
    const nationSearch = document.getElementById('nation_search');
    const nationResults = document.getElementById('nation_results');
    const nationSlugInput = document.getElementById('nation_slug');
    const nationSelected = document.getElementById('nation_selected');
    const nationSlugDisplay = document.getElementById('nation_slug_display');
    const lookupStatus = document.getElementById('lookup-status');
    const nbIdRow = document.getElementById('nb-id-row');
    const nbIdInput = document.getElementById('nb_id_input');
    const nbIdHelp = document.getElementById('nb-id-help');
    const continueBtn = document.getElementById('continue-btn');
    let selectedNationName = '';
    let nationTimer;

    const savedSlug = "{{ default_nation_slug }}";
    const savedName = "{{ default_nation_name }}";
    const savedNbId = "{{ author_nb_id }}";
    if (savedSlug && savedName) {
      nationSlugInput.value = savedSlug;
      nationSearch.value = savedName;
      nationSlugDisplay.textContent = savedSlug;
      nationSelected.style.display = 'block';
      selectedNationName = savedName;
      nbIdRow.style.display = 'block';
      if (savedNbId) {
        nbIdInput.value = savedNbId;
        nbIdHelp.innerHTML = `<span class="ok">✓ Previously saved</span> — edit to change`;
        continueBtn.disabled = false;
      }
    }

    nationSearch.addEventListener('input', () => {
      clearTimeout(nationTimer);
      const val = nationSearch.value.trim();
      nationSlugInput.value = '';
      nationSelected.style.display = 'none';
      nbIdRow.style.display = 'none';
      lookupStatus.innerHTML = '';
      continueBtn.disabled = true;
      if (val.length < 2) { nationResults.style.display = 'none'; return; }
      nationTimer = setTimeout(() => runNationSearch(val), 300);
    });

    document.addEventListener('click', e => {
      if (!nationSearch.contains(e.target) && !nationResults.contains(e.target))
        nationResults.style.display = 'none';
    });

    async function runNationSearch(term) {
      nationResults.innerHTML = '<div class="dropdown-item" style="color:#5a7a96;">Searching…</div>';
      nationResults.style.display = 'block';
      try {
        const resp = await fetch(`/search-nation?term=${encodeURIComponent(term)}`);
        const json = await resp.json();
        nationResults.innerHTML = '';
        if (!json.success || !json.records.length) {
          nationResults.innerHTML = '<div class="dropdown-item" style="color:#5a7a96;">No matches found</div>';
          return;
        }
        json.records.forEach(r => {
          const d = document.createElement('div');
          d.className = 'dropdown-item';
          d.innerHTML = `<div class="item-main">${r.group}</div>
            <div class="item-sub">${[r.state, r.slug].filter(Boolean).join(' — ')}</div>`;
          d.addEventListener('click', () => {
            nationSlugInput.value = r.slug;
            nationSearch.value = r.group;
            selectedNationName = r.group;
            nationSlugDisplay.textContent = r.slug;
            nationSelected.style.display = 'block';
            nationResults.style.display = 'none';
            lookupAuthorId(r.slug);
          });
          nationResults.appendChild(d);
        });
      } catch (err) {
        nationResults.innerHTML = `<div class="dropdown-item" style="color:#f87171;">Error: ${err.message}</div>`;
      }
    }

    async function lookupAuthorId(slug) {
      lookupStatus.innerHTML = `<div class="lookup-loading">
        <svg class="spin" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        Looking up your account…
      </div>`;
      nbIdRow.style.display = 'none';
      continueBtn.disabled = true;
      try {
        const resp = await fetch(`/get-author-id?nation_slug=${encodeURIComponent(slug)}`);
        const json = await resp.json();
        nbIdRow.style.display = 'block';
        if (json.nb_id) {
          nbIdInput.value = json.nb_id;
          lookupStatus.innerHTML = `<div class="alert-ok">✓ Found: <strong>${json.name || 'your account'}</strong> — ID: <strong>${json.nb_id}</strong></div>`;
          nbIdHelp.innerHTML = `Auto-filled from your account — edit if needed`;
          continueBtn.disabled = false;
        } else {
          nbIdInput.value = '';
          lookupStatus.innerHTML = `<div class="alert-warn">Account not found in this nation — enter your NB ID manually.</div>`;
          nbIdInput.focus();
        }
      } catch {
        nbIdRow.style.display = 'block';
        nbIdInput.value = '';
        lookupStatus.innerHTML = `<div class="alert-warn">Couldn't auto-lookup ID — enter it manually.</div>`;
      }
    }

    nbIdInput.addEventListener('input', () => {
      continueBtn.disabled = !nationSlugInput.value.trim() || !nbIdInput.value.trim();
    });

    async function saveAndContinue() {
      const slug = nationSlugInput.value.trim();
      const nbId = nbIdInput.value.trim();
      if (!slug) { nationSearch.focus(); return; }
      continueBtn.disabled = true;
      continueBtn.textContent = 'Saving…';
      try {
        await fetch('/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nation_slug: slug, nation_name: selectedNationName, author_nb_id: nbId }),
        });
        window.location.href = '/';
      } catch (err) {
        continueBtn.disabled = false;
        continueBtn.textContent = 'Continue →';
        alert('Error saving: ' + err.message);
      }
    }
  </script>
</body>
</html>
